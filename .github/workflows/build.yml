# =============================================================================
# Build & Push Workflow
# Triggers on merge to main, builds multi-stage Docker images and pushes to GHCR
# Requirements: 4.3, 4.7
# =============================================================================
name: Build and Push Images

on:
  push:
    branches:
      - main

permissions:
  packages: write
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build and push login-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: login-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rathena-login:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/rathena-login:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push char-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: char-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rathena-char:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/rathena-char:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push map-server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: map-server
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rathena-map:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/rathena-map:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push fluxcp
        uses: docker/build-push-action@v6
        with:
          context: ./docker/fluxcp
          file: ./docker/fluxcp/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/rathena-fluxcp:sha-${{ steps.sha.outputs.short }}
            ghcr.io/${{ github.repository_owner }}/rathena-fluxcp:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
